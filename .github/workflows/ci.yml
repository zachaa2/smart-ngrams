name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-go:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Go vet
        run: go vet ./...

      - name: Go tests
        run: go test ./...

      - name: Build WASM binary
        run: GOOS=js GOARCH=wasm go build -o /tmp/main.wasm ./wasm/

  build-frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build WASM binary
        run: GOOS=js GOARCH=wasm go build -o frontend/public/main.wasm ./wasm/

      - name: Copy wasm_exec.js
        run: cp $(go env GOROOT)/lib/wasm/wasm_exec.js frontend/public/

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
