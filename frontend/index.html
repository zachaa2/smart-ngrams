<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- pico.css stylesheet -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <!-- custom stylesheet -->
    <link rel="stylesheet" href="/src/style.css" />
    <!-- lucide icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="icon" type="image/svg+xml" href="/braces.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Ngrams</title>
  </head>
  <body>
    <!-- same header in other pages -->
    <header style="margin: 1em">
      <nav>
        <ul>
          <li><a href="./index.html" class="contrast">Smart Ngrams</a></li>
          <li><a href="./algorithm.html" class="contrast">Algorithm</a></li>
        </ul>
      </nav>
    </header>
    <!-- main content -->
    <main class="container">
      <!-- ngrams input -->
      <section id="input-section">
        <h2>Input Text</h2>
        <textarea
          id="input-textarea"
          placeholder="Paste your text here..."
          rows="10"
        ></textarea>
      </section>
      <!-- ngrams settings -->
      <section id="settings-section">
        <h2>Configure Levels</h2>  
        <div id="levels">
          <!-- levels rows rendered by JS -->
        </div>
      </section>
      <!-- buttons -->
       <div class="btn-row">
        <button id="add-level-btn" class="secondary outline">
          <i data-lucide="plus"></i>Add Level
        </button>
        <button id="run-btn" disabled>Analyze</button>
       </div>
      <!-- results -->
      <section id="results-section" class="results-section">
        <article>
          <h3>Results</h3>
          <div id="results">
            <!-- results rendered by JS -->
             <span>Click "Analyze" to compute ngrams. Results will show up here</span>
          </div>
        </article>
      </section>
    </main>
    <!-- same footer in other pages -->
    <footer>
      <nav>
        <ul>
          <li>
            <a href="https://github.com/zachaa2/smart-ngrams" target="_blank">
              <i data-lucide="code-2"></i>Source
            </a>
          </li>
          <li>
            <a href="https://zachaa2.github.io/" target="_blank">
              <i data-lucide="globe"></i>Website
            </a>
          </li>
        </ul>
      </nav>
    </footer>
    <script src="/wasm_exec.js"></script>
    <script type="module" src="/src/main.js"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
